name: Validate and publish Stylist Beta

on:
  push:

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p /tmp/stylist-release
          echo '' | base64 -d > /tmp/stylist-release.zip
          unzip -q /tmp/stylist-release.zip -d /tmp/stylist-release
          rsync -a --delete --exclude '.git' --exclude '.github' /tmp/stylist-release/ ./
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run test
      - name: Production build
        run: npm run build
      - name: Publish tested release
        shell: bash
        run: |
          rm -f .github/workflows/publish-stylist-beta.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prepare Stylist Beta for public launch"
          git push
