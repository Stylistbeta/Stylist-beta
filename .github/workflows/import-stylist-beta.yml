name: Import Stylist Beta

on:
  push:

permissions:
  contents: write

jobs:
  import-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import project files
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/stylist-beta.zip
          unzip -q -o /tmp/stylist-beta.zip -d .
          rm -f .github/workflows/import-stylist-beta.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import Stylist Beta project"
          git push
